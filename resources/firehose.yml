Type: AWS::KinesisFirehose::DeliveryStream
Properties:
  DeliveryStreamType: DirectPut
  ExtendedS3DestinationConfiguration:
    BucketARN: !GetAtt LogBucket.Arn
    RoleARN: !GetAtt FirehoseRole.Arn
    Prefix: "logs/logGroup=!{partitionKeyFromQuery:logGroup}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/"
    ErrorOutputPrefix: "logs-errors/!{firehose:error-output-type}/"
    DynamicPartitioningConfiguration:
      Enabled: true
      RetryOptions:
        DurationInSeconds: 300
    ProcessingConfiguration:
      Enabled: true
      Processors:
        - Type: Decompression
          Parameters:
            - ParameterName: CompressionFormat
              ParameterValue: GZIP
        - Type: MetadataExtraction
          Parameters:
            - ParameterName: MetadataExtractionQuery
              ParameterValue: '{logGroup: .logGroup}'
            - ParameterName: JsonParsingEngine
              ParameterValue: JQ-1.6
        - Type: AppendDelimiterToRecord
          Parameters:
            - ParameterName: Delimiter
              ParameterValue: "\\n"
    BufferingHints:
      IntervalInSeconds: 300  # Buffer time before writing helps to reduce the number of writes
      SizeInMBs: 64
    CompressionFormat: GZIP
